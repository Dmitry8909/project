services:
  citus-coordinator:
    image: citusdata/citus:12.1
    command: ["postgres", "-c", "max_connections=500"]
    environment:
      POSTGRES_USER: blog
      POSTGRES_PASSWORD: blog_pass
      POSTGRES_DB: blog
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog"]
      interval: 5s
      timeout: 5s
      retries: 5

  citus-worker-1:
    image: citusdata/citus:12.1
    command: ["postgres", "-c", "max_connections=500"]
    environment:
      POSTGRES_USER: blog
      POSTGRES_PASSWORD: blog_pass
      POSTGRES_DB: blog
    volumes:
      - pgdata1:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog"]
      interval: 5s
      timeout: 5s
      retries: 5
  citus-worker-2:
    image: citusdata/citus:12.1
    command: ["postgres", "-c", "max_connections=500"]
    environment:
      POSTGRES_USER: blog
      POSTGRES_PASSWORD: blog_pass
      POSTGRES_DB: blog
    volumes:
      - pgdata2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: bitnamilegacy/pgbouncer:1.24.1-debian-12-r6
    ports:
      - "6432:6432"
    environment:
      POSTGRESQL_HOST: citus-coordinator
      POSTGRESQL_PORT: 5432
      POSTGRESQL_USERNAME: blog
      POSTGRESQL_PASSWORD: blog_pass
      POSTGRESQL_DATABASE: blog
      PGBOUNCER_DATABASE: blog
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: 1000
      PGBOUNCER_DEFAULT_POOL_SIZE: 200
      PGBOUNCER_MIN_POOL_SIZE: 50
      PGBOUNCER_AUTH_TYPE: plain
    depends_on:
      citus-coordinator:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=\"$$POSTGRESQL_PASSWORD\" psql -p 6432 -U \"$$POSTGRESQL_USERNAME\" -h localhost -b -c \"SELECT 1\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 8
      CLUSTER_ID: "MkRlY2VtYmVyMjAyNlNjeWxsYQ=="
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  scylla:
    image: scylladb/scylla:6.0
    ports:
      - "9042:9042"
    command: >
      --smp 1 --memory 2G --developer-mode 1
      --authenticator AllowAllAuthenticator
    volumes:
      - scylla_data:/var/lib/scylla
    healthcheck:
      test: ["CMD", "nodetool", "status"]
      interval: 15s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-cluster-0:
    image: redis:7-alpine
    command: >
      redis-server --port 6379 --cluster-enabled yes
      --cluster-config-file nodes.conf --cluster-node-timeout 5000
      --appendonly yes
      --cluster-announce-ip redis-cluster-0
      --cluster-announce-port 6379
      --cluster-announce-bus-port 16379
    ports:
      - "6380:6379"
    volumes:
      - redis-cluster-0:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-cluster-1:
    image: redis:7-alpine
    command: >
      redis-server --port 6379 --cluster-enabled yes
      --cluster-config-file nodes.conf --cluster-node-timeout 5000
      --appendonly yes
      --cluster-announce-ip redis-cluster-1
      --cluster-announce-port 6379
      --cluster-announce-bus-port 16379
    ports:
      - "6381:6379"
    volumes:
      - redis-cluster-1:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-cluster-2:
    image: redis:7-alpine
    command: >
      redis-server --port 6379 --cluster-enabled yes
      --cluster-config-file nodes.conf --cluster-node-timeout 5000
      --appendonly yes
      --cluster-announce-ip redis-cluster-2
      --cluster-announce-port 6379
      --cluster-announce-bus-port 16379
    ports:
      - "6382:6379"
    volumes:
      - redis-cluster-2:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-cluster-init:
    image: redis:7-alpine
    depends_on:
      redis-cluster-0:
        condition: service_healthy
      redis-cluster-1:
        condition: service_healthy
      redis-cluster-2:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - sh
      - -c
      - |
        sleep 3
        redis-cli --cluster create \
          redis-cluster-0:6379 \
          redis-cluster-1:6379 \
          redis-cluster-2:6379 \
          --cluster-replicas 0 \
          --cluster-yes
        echo "Redis Cluster created"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: blog
      RABBITMQ_DEFAULT_PASS: blog_pass
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ./services
      dockerfile: api-gateway/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      user-service:
        condition: service_started
      post-service:
        condition: service_started
      message-service:
        condition: service_started
      media-service:
        condition: service_started
    environment:
      USER_SERVICE_URL: http://user-service:8001
      POST_SERVICE_URL: http://post-service:8002
      MESSAGE_SERVICE_URL: http://message-service:8003
      MEDIA_SERVICE_URL: http://media-service:8004
      NOTIFICATION_SERVICE_URL: http://notification-service:8005
      RABBITMQ_URL: amqp://blog:blog_pass@rabbitmq:5672/
      CORS_ORIGINS: http://localhost:3000,http://192.168.0.3:3000
    restart: unless-stopped

  user-service:
    build:
      context: ./services
      dockerfile: user-service/Dockerfile
    ports:
      - "8001:8001"
    depends_on:
      pgbouncer:
        condition: service_healthy
      citus-coordinator:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://blog:blog_pass@pgbouncer:6432/blog
      RABBITMQ_URL: amqp://blog:blog_pass@rabbitmq:5672/
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-change-in-production}

  post-service:
    build:
      context: ./services
      dockerfile: post-service/Dockerfile
    ports:
      - "8002:8002"
    depends_on:
      pgbouncer:
        condition: service_healthy
      user-service:
        condition: service_started
      citus-coordinator:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://blog:blog_pass@pgbouncer:6432/blog
      RABBITMQ_URL: amqp://blog:blog_pass@rabbitmq:5672/
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_TIMELINE_URL: redis://redis-cluster-0:6379,redis://redis-cluster-1:6379,redis://redis-cluster-2:6379
      REDIS_TIMELINE_CLUSTER: "true"
      SCYLLA_CONTACT_POINTS: scylla

  message-service:
    build:
      context: ./services
      dockerfile: message-service/Dockerfile
    ports:
      - "8003:8003"
    depends_on:
      pgbouncer:
        condition: service_healthy
      user-service:
        condition: service_started
      citus-coordinator:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://blog:blog_pass@pgbouncer:6432/blog
      RABBITMQ_URL: amqp://blog:blog_pass@rabbitmq:5672/

  media-service:
    build:
      context: ./services
      dockerfile: media-service/Dockerfile
    ports:
      - "8004:8004"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: blog-media

  notification-service:
    build:
      context: ./services
      dockerfile: notification-service/Dockerfile
    ports:
      - "8005:8005"
    depends_on:
      pgbouncer:
        condition: service_healthy
      user-service:
        condition: service_started
      citus-coordinator:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://blog:blog_pass@pgbouncer:6432/blog
      RABBITMQ_URL: amqp://blog:blog_pass@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0

  fanout-consumer:
    build:
      context: ./services
      dockerfile: fanout-consumer/Dockerfile
    depends_on:
      pgbouncer:
        condition: service_healthy
      citus-coordinator:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://blog:blog_pass@pgbouncer:6432/blog
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_TIMELINE_URL: redis://redis-cluster-0:6379,redis://redis-cluster-1:6379,redis://redis-cluster-2:6379
      REDIS_TIMELINE_CLUSTER: "true"
      SCYLLA_CONTACT_POINTS: scylla
      RABBITMQ_URL: amqp://blog:blog_pass@rabbitmq:5672/
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
    environment:
      NUXT_PUBLIC_API_BASE: http://192.168.0.3:8000
      NUXT_PUBLIC_WS_BASE: ws://192.168.0.3:8005
    restart: unless-stopped

volumes:
  pgdata:
  pgdata1:
  pgdata2:
  scylla_data:
  redis-cluster-0:
  redis-cluster-1:
  redis-cluster-2:
  miniodata:
